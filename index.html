<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Bebas+Neue&display=swap');

  pointer-events: none; opacity: 0.5;

<body>

<div id="app">
  <header>
    <div class="title-block">
    </div>
    <div class="visit-badge">
      <div class="num" id="visit-num">—</div>
      <div class="lbl">총 방문</div>
    </div>
  </header>

  <main>
    <div id="upload-zone">
      <p>이미지를 클릭하거나 드래그해서 업로드</p>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="canvas-section" style="display:none">
      <div id="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="deg-overlay" id="deg-label">열화율 0%</div>
        <div id="stage-label">원본</div>
      </div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-pct" id="prog-pct">0 / 0</div>
      </div>
    </div>

    <div id="error-msg"></div>

    <div class="notice">
      이 이미지는 방문자가 늘어날수록 천천히 열화됩니다.<br>
      당신의 방문이 작품을 변화시킵니다.<br>
      <span>현재 방문 횟수: <span id="notice-visits">—</span> / <span id="notice-max">—</span></span>
    </div>
  </main>
</div>

<script>



var MAX_VISITS = 150;  // 열화 완료 기준 방문 횟수

var IMAGE_BASE64 = "https://raw.githubusercontent.com/Gnao2/aritd/main/image.jpg";  

var FIREBASE_API_KEY        = "AIzaSyDs8RtYNZKPPX4e423JcblqR6HJmJOyEwY";
var FIREBASE_AUTH_DOMAIN    = "pic-im-baa48.firebaseapp.com";
var FIREBASE_PROJECT_ID     = "pic-im-baa48";
var FIREBASE_DATABASE_URL   = "https://pic-im-baa48-default-rtdb.firebaseio.com";
var FIREBASE_STORAGE_BUCKET = "pic-im-baa48.appspot.com";
var FIREBASE_MESSAGING_ID   = "645876155680";
var FIREBASE_APP_ID         = "1:645876155680:web:16b70f4254d34f3263c345";

// =============================================


var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var originalImageData = null;
var currentVisits = 0;

function loadImage(src) {
  var img = new Image();
  img.crossOrigin = "anonymous";
  img.onload = function() {
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('canvas-section').style.display = 'block';
    renderDegradation(currentVisits);
  };
  img.src = src;
}

function getStage(t) {
  if (t < 0.05) return '원본';
  if (t < 0.2)  return '노이즈';
  if (t < 0.4)  return '픽셀화';
  if (t < 0.6)  return '글리치';
  if (t < 0.8)  return '탈색';
  if (t < 0.99) return '소멸 직전';
  return '파괴됨';
}

function renderDegradation(visits) {
  if (!originalImageData) return;
  var t = Math.min(visits / MAX_VISITS, 1);
  var w = canvas.width;
  var h = canvas.height;
  var src = new Uint8ClampedArray(originalImageData.data);
  var out = ctx.createImageData(w, h);
  var d = out.data;
  var i, n, gray, fade, burn;
  for (i = 0; i < src.length; i++) d[i] = src[i];

  if (t > 0.05) {
    var amt = Math.min((t - 0.05) / 0.15, 1) * 60;
    for (i = 0; i < d.length; i += 4) {
      n = (Math.random() - 0.5) * amt;
      d[i]   = Math.min(255, Math.max(0, d[i]   + n));
      d[i+1] = Math.min(255, Math.max(0, d[i+1] + n));
      d[i+2] = Math.min(255, Math.max(0, d[i+2] + n));
    }
  }

  if (t > 0.2) {
    var blockSize = Math.floor(2 + ((t - 0.2) / 0.2) * 32);
    var by, bx, dy, dx, si, ni, br, bg, bb;
    for (by = 0; by < h; by += blockSize) {
      for (bx = 0; bx < w; bx += blockSize) {
        si = (by * w + bx) * 4;
        br = d[si]; bg = d[si+1]; bb = d[si+2];
        for (dy = 0; dy < blockSize && by+dy < h; dy++) {
          for (dx = 0; dx < blockSize && bx+dx < w; dx++) {
            ni = ((by+dy)*w + (bx+dx)) * 4;
            d[ni]=br; d[ni+1]=bg; d[ni+2]=bb;
          }
        }
      }
    }
  }

  if (t > 0.4) {
    var lines = Math.floor(((t - 0.4) / 0.2) * 30);
    var gy, gx, shift, sx, sii, di;
    for (var g = 0; g < lines; g++) {
      gy = Math.floor(Math.random() * h);
      shift = Math.floor((Math.random() - 0.5) * ((t-0.4)/0.2) * 160);
      for (gx = 0; gx < w; gx++) {
        sx = (gx + shift + w) % w;
        sii = (gy * w + sx) * 4;
        di  = (gy * w + gx) * 4;
        d[di]=d[sii]; d[di+1]=d[sii+1]; d[di+2]=d[sii+2];
      }
    }
  }

  if (t > 0.6) {
    fade = Math.min((t - 0.6) / 0.2, 1);
    for (i = 0; i < d.length; i += 4) {
      gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
      d[i]   = d[i]   * (1-fade) + gray * fade;
      d[i+1] = d[i+1] * (1-fade) + gray * fade;
      d[i+2] = d[i+2] * (1-fade) + gray * fade;
    }
  }

  if (t > 0.8) {
    burn = Math.min((t - 0.8) / 0.2, 1);
    for (i = 0; i < d.length; i += 4) {
      d[i]   = d[i]   * (1 - burn);
      d[i+1] = d[i+1] * (1 - burn);
      d[i+2] = d[i+2] * (1 - burn);
    }
  }

  ctx.putImageData(out, 0, 0);

  var pct = Math.round(t * 100);
  document.getElementById('deg-label').textContent = '열화율 ' + pct + '%';
  document.getElementById('stage-label').textContent = getStage(t);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = visits + ' / ' + MAX_VISITS;
  document.getElementById('notice-visits').textContent = visits;
  document.getElementById('notice-max').textContent = MAX_VISITS;
}

function initFirebase() {
  try {
    firebase.initializeApp({
      apiKey:            FIREBASE_API_KEY,
      authDomain:        FIREBASE_AUTH_DOMAIN,
      databaseURL:       FIREBASE_DATABASE_URL,
      projectId:         FIREBASE_PROJECT_ID,
      storageBucket:     FIREBASE_STORAGE_BUCKET,
      messagingSenderId: FIREBASE_MESSAGING_ID,
      appId:             FIREBASE_APP_ID
    });
    var db  = firebase.database();
    var ref = db.ref('visits');
    ref.transaction(function(current) { return (current || 0) + 1; });
    ref.on('value', function(snap) {
      var v = snap.val() || 0;
      currentVisits = v;
      document.getElementById('visit-num').textContent = v;
      document.getElementById('visit-num').classList.add('flash');
      setTimeout(function() {
        document.getElementById('visit-num').classList.remove('flash');
      }, 500);
      renderDegradation(v);
    });
  } catch(e) {
    var el = document.getElementById('error-msg');
    el.style.display = 'block';
    el.textContent = 'Firebase 오류: ' + e.message;
  }
}

function init() {
  var zone  = document.getElementById('upload-zone');
  var input = document.getElementById('file-input');

  zone.addEventListener('click', function() { input.click(); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    var file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });
  input.addEventListener('change', function() {
    if (input.files[0]) readFile(input.files[0]);
  });

  function readFile(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      loadImage(e.target.result);
      initFirebase();
    };
    reader.readAsDataURL(file);
  }

  if (IMAGE_BASE64) {
    loadImage(IMAGE_BASE64);
    initFirebase();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>


</body></html>
